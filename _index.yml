indexpage:
  title: NetApp Data Migrator documentation
  lead: NetApp Data Migrator (NDM) is an enterprise-grade, multicloud, data migration software application that is designed to simplify and accelerate the transfer of file-based workloads from on-premises or third-party storage systems to NetApp’s first-party cloud storage services. NDM helps you to discover your existing storage environments, plan and execute data migrations, and allows you to monitor their progress through an easy-to-use, unified interface.
